name: 🔋 Build ChargingMeter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipe build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. JDK ──────────────────────────────
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ──────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Setup Gradle (WAJIB) ─────────────
      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ── 5. Generate wrapper otomatis ────────
      - name: 🛠 Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      # ── 6. Permission ───────────────────────
      - name: 🔑 Permission gradlew
        run: chmod +x gradlew

      # ── 7. Info ─────────────────────────────
      - name: 🔍 Info environment
        run: |
          java -version
          gradle --version
          ./gradlew --version

      # ── 8. Build Debug ──────────────────────
      - name: 🔨 Build APK Debug
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 9. Build Release ────────────────────
      - name: 🚀 Build APK Release
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 10. Upload Debug ────────────────────
      - name: 📤 Upload APK Debug
        if: success() && github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ChargingMeter-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk

      # ── 11. Upload Release ──────────────────
      - name: 📤 Upload APK Release
        if: success() && github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ChargingMeter-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
